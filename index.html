<!DOCTYPE html>
<html lang="es" data-theme="a">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>libro-recetas</title>
  <meta name="description" content="Un cuaderno digital para cenas de viernes, comidas rápidas de martes y los trucos que solo recuerdas a medias.">
  <meta name="theme-color" content="#3A4229">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Recetas">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#main" class="skip-link">Saltar al contenido</a>

<div id="app">
    <main id="main" tabindex="-1">
      <div class="empty-state" aria-live="polite">
        <p>Cargando recetas…</p>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/my-recipes/sw.js', { scope: '/my-recipes/' })
        .catch(err => console.warn('SW:', err));
    }
  </script>
</body>
</html>
